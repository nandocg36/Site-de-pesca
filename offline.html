<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#061018" />
  <title>Sem ligação — Pesca Plataforma Norte</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .offline-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem calc(2rem + env(safe-area-inset-bottom, 0));
      text-align: center;
      max-width: 28rem;
      margin: 0 auto;
    }
    .offline-page h1 {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 5vw, 1.85rem);
      font-weight: 700;
      margin: 0 0 0.75rem;
      color: var(--text);
    }
    .offline-page p {
      color: var(--muted);
      line-height: 1.6;
      margin: 0 0 1.5rem;
    }
    .offline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <main class="offline-page" id="offlineMain">
    <h1>Sem ligação à rede</h1>
    <p>
      Não foi possível atualizar os dados. Verifique o Wi‑Fi ou os dados móveis. Se já visitou o site antes, parte da página pode abrir do cache ao
      voltar à página inicial.
    </p>
    <div class="offline-actions">
      <a class="btn primary" href="./index.html">Tentar de novo</a>
    </div>
  </main>
</body>
</html>
